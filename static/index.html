<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/style.css">
    <link id="theme-css" rel="stylesheet" href="/static/themes/bioluminescent.css">
</head>
<body class="min-h-screen">
    <header class="border-b px-6 py-4 border-[color:var(--border-color)]">
        <div class="max-w-[1600px] mx-auto flex items-center justify-between gap-4">
            <div class="flex items-center gap-3 min-w-0">
                <img id="agent-avatar" class="w-10 h-10 rounded-full hidden" alt="Agent avatar">
                <span id="agent-emoji" class="text-3xl">🤖</span>
                <div class="min-w-0">
                    <h1 id="agent-title" class="text-xl font-bold tracking-tight truncate">Dashboard</h1>
                    <p id="agent-tagline" class="text-xs font-mono text-[color:var(--text-secondary)] truncate">Loading...</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <div id="nz-time" class="text-xs font-mono text-[color:var(--text-secondary)]">--:-- --</div>
                    <div id="uptime" class="text-xs font-mono text-[color:var(--text-muted)]">Up --</div>
                </div>
                <div id="connection-dot" class="w-2.5 h-2.5 rounded-full ring-2" title="Connecting..."></div>
            </div>
        </div>
    </header>

    <nav class="tab-nav-wrap border-b border-[color:var(--border-color)] px-6">
        <div class="max-w-[1600px] mx-auto">
            <div id="tab-nav" class="tab-nav" role="tablist" aria-label="Dashboard Tabs"></div>
        </div>
    </nav>

    <main class="max-w-[1600px] mx-auto p-6">
        <section id="tab-content"></section>
    </main>

    <footer class="border-t border-[color:var(--border-color)] py-4 mt-8">
        <p class="text-center text-xs font-mono text-[color:var(--text-muted)]">
            <span id="footer-agent">Agent</span> · <span id="footer-time"></span>
        </p>
    </footer>

    <script src="/static/app.js"></script>
</body>
</html>
