# OpenClaw Dashboard — Configuration
# Copy this to config.yaml and customise for your setup.
# Secrets (API keys, passwords) go in .env — never here.

# ---------------------------------------------------------------------------
# Agent Identity
# ---------------------------------------------------------------------------
agent:
  name: "Percy"
  emoji: "🪸"
  tagline: "An AI familiar clinging to the edge of what's possible"
  avatar: "static/avatar.png"    # optional, path to avatar image
  theme: "bioluminescent"        # bioluminescent | midnight | terminal | minimal

# ---------------------------------------------------------------------------
# Panels — enable/disable based on your hardware
# ---------------------------------------------------------------------------

# Spotify playback (requires SPOTIFY_CLIENT_ID, SPOTIFY_CLIENT_SECRET in .env)
spotify:
  enabled: true
  token_file: "~/.percy/credentials/spotify-tokens.json"

# Philips Hue lights (requires HUE_BASE in .env)
hue:
  enabled: true
  groups:
    "1": "Living Room"
    "2": "Bedroom"

# Yamaha MusicCast receiver (requires YAMAHA_BASE in .env)
yamaha:
  enabled: true

# Ollama LLM server (requires OLLAMA_HOST in .env)
ollama:
  enabled: true

# NAS / storage server (requires NAS_SSH_TARGET in .env)
nas:
  enabled: true
  name: "NAS"
  media_paths:
    music: "/volume1/Music"
    movies: "/volume1/Movies"
    photos: "/volume1/Photos"

# Backups freshness check
backups:
  enabled: true
  check_command: "ssh ${NAS_SSH_TARGET} cat /backups/last-backup.txt"

# Log file viewers
logs:
  enabled: true
  files:
    bulletin-prep:
      path: "~/.percy/logs/bulletin-prep.log"
      label: "Bulletin Prep"
    bulletin-send:
      path: "~/.percy/logs/bulletin-send.log"
      label: "Bulletin Send"
    backup:
      path: "~/.percy/logs/backup.log"
      label: "Backup"

# ---------------------------------------------------------------------------
# Host Tabs — one tab per machine you want to monitor
# ---------------------------------------------------------------------------
hosts:
  - name: "MORPHEUS"
    type: "local"               # local = this machine (no SSH needed)
    emoji: "🖥️"
    tab: true                   # show as its own tab
    show_cron: true             # display cron schedule
    projects_dir: "~/projects"
    project_descriptions:
      percy: "Agent website"
      percy-dashboard: "This dashboard"

  - name: "HYPNOS"
    type: "ssh"                 # ssh = remote machine
    emoji: "🤖"
    ssh_target: "${REMOTE_HOST_SSH}"   # from .env
    tab: true
    ollama: true                # show Ollama models panel
    projects_dir: "C:\\clawprojects"
    project_descriptions:
      bulletin: "Newsletter drafting pipeline"
      coaching: "Coaching content processing"

# ---------------------------------------------------------------------------
# Network Devices (Settings tab)
# ---------------------------------------------------------------------------
network_devices:
  - name: "Primary Host"
    ip: "${LAN_IP}"
    role: "Dashboard host"
  - name: "Remote Host"
    ip: "${OLLAMA_HOST_IP}"
    role: "LLM server"
  - name: "NAS"
    ip: "10.0.0.30"
    role: "Storage"
